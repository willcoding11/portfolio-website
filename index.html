<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>William Culver — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<nav>
  <div class="nav-name" onclick="switchPage('home')">William Culver</div>
  <div class="nav-links">
    <button class="nav-link active" data-page="home">Home</button>
    <button class="nav-link" data-page="projects">Projects</button>
    <button class="nav-link" data-page="about">About</button>
    <button class="nav-link" data-page="contact">Contact</button>
  </div>
</nav>

<!-- ═══ MAIN ═══ -->
<main>
  <section class="page active visible" id="page-home"></section>
  <section class="page" id="page-projects"></section>

  <!-- ── ABOUT ── (rendered by js/render.js) -->
  <section class="page" id="page-about"></section>

  <!-- ── CONTACT ── (rendered by js/render.js) -->
  <section class="page" id="page-contact"></section>
</main>

<!-- ═══ PROJECT DETAIL MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/modal.js"></script>
<script src="js/nav.js"></script>
<script src="js/dev.js"></script>

</body>
</html>
